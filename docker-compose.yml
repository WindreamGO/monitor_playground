# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  Docker Compose 编排文件                                                     │
# │  三个服务：trading（Python交易模拟器）、prometheus、grafana                   │
# │  官方文档：https://docs.docker.com/compose/compose-file/                     │
# └─────────────────────────────────────────────────────────────────────────────┘

# Compose 文件格式规范（Compose Specification）
# 不再需要显式写 "version:"，新版 Docker Compose（v2.x）已废弃该字段

services:

  # ══════════════════════════════════════════════════════════════════════════════
  # Service: trading — Python 随机交易模拟器
  # ══════════════════════════════════════════════════════════════════════════════
  trading:

    # build：从本地 Dockerfile 构建镜像，而不是拉取现成镜像
    build:
      # context：构建上下文目录（即 COPY 指令的"根目录"）
      # Docker daemon 会将此目录下的文件打包发送给构建引擎
      context: ./trading

      # dockerfile：指定 Dockerfile 文件名（我们使用小写 dockerfile）
      # 不指定则默认寻找 "Dockerfile"（大写），找不到会报错
      dockerfile: dockerfile

    # ports：将容器端口映射到宿主机端口，格式 "宿主机端口:容器端口"
    # "28000:8000" → 访问宿主机 localhost:28000 等于访问容器内的 :8000
    # 这里暴露出来方便验证：curl http://localhost:28000/metrics
    # 生产环境中若 Prometheus 与 trading 在同一 Compose 网络，可以移除此映射
    ports:
      - "28000:8000"

    # restart：容器意外退出时的重启策略
    # "unless-stopped"：只要不是被手动 `docker stop` 停止，就自动重启
    # 其他可选值：no（不重启）、always（总是重启）、on-failure（仅失败时重启）
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════════
  # Service: prometheus — 时序数据库 + 抓取引擎
  # ══════════════════════════════════════════════════════════════════════════════
  prometheus:

    # image：使用 Docker Hub 上的官方 Prometheus 镜像
    # 生产环境建议固定版本号，如 prom/prometheus:v3.3.0，避免 latest 带来的不确定性
    image: prom/prometheus:latest

    ports:
      # 暴露 Prometheus Web UI 和 HTTP API 到宿主机
      # 访问 http://localhost:29090 可以：
      #   - 查看抓取目标状态：Status → Targets
      #   - 直接执行 PromQL 查询：Graph 页面
      - "29090:9090"

    volumes:
      # 挂载一：将宿主机的 prometheus.yml 配置文件映射到容器内的标准路径
      # ":ro" = read-only，容器内不可修改此文件，提高安全性
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      # 挂载二：将 named volume prometheus_data 挂载到 TSDB 数据目录
      # Prometheus 的所有时序数据（block 文件、WAL 日志）都写在 /prometheus
      # 使用 named volume 而不是 bind mount：
      #   - Docker 管理存储位置，不与宿主机文件系统耦合
      #   - 容器删除（docker compose down）后 volume 保留，历史数据不丢失
      - prometheus_data:/prometheus

    # command：覆盖镜像默认的启动命令，向 Prometheus 传递启动参数
    command:
      # 指定配置文件路径（与上面的 volume mount 路径一致）
      - "--config.file=/etc/prometheus/prometheus.yml"

      # 指定 TSDB 数据存储路径（与上面的 volume mount 路径一致）
      - "--storage.tsdb.path=/prometheus"

      # 数据保留时长：超过此时间的数据块会被自动清理
      # 演示环境设为 7 天，生产环境官方默认值为 15 天
      - "--storage.tsdb.retention.time=7d"

      # 启用 Prometheus 的 /api/v1/admin/ 管理接口（用于手动删除数据等操作）
      # 演示环境开启，生产环境按需决定
      - "--web.enable-admin-api"

    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════════
  # Service: grafana — 可视化面板
  # ══════════════════════════════════════════════════════════════════════════════
  grafana:

    # 使用官方 Grafana OSS（开源版）镜像
    # grafana/grafana-oss 与 grafana/grafana 内容相同，后者是别名
    image: grafana/grafana:latest

    ports:
      # 暴露 Grafana Web UI 到宿主机
      # 访问 http://localhost:23000，默认账号/密码：admin / admin
      - "23000:3000"

    volumes:
      # 挂载一：provisioning 目录（数据源 + dashboard provider 配置）
      # 容器启动时 Grafana 会扫描此目录完成自动配置
      # ":ro" = 容器只读，防止 Grafana 意外修改配置文件
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

      # 挂载二：dashboard JSON 文件目录
      # 路径必须与 provider.yml 中的 options.path 一致：/var/lib/grafana/dashboards
      # ":ro" = 只读，dashboard 修改必须通过修改宿主机文件完成
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

      # 挂载三：named volume 持久化 Grafana 运行时数据
      # 包括：grafana.db（用户/API key/UI创建的dashboard）、已安装插件等
      # 注意：provisioning 目录单独挂载（:ro），所以 grafana_data 不会覆盖它
      - grafana_data:/var/lib/grafana

    # environment：通过环境变量覆盖 Grafana 配置
    # 所有 Grafana 配置项都可用 GF_<SECTION>_<KEY> 格式通过环境变量设置
    # 官方文档：https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/
    environment:
      # 初始管理员用户名（默认值就是 admin，此处显式写出以示清晰）
      - GF_SECURITY_ADMIN_USER=admin

      # 初始管理员密码
      # 首次登录后 Grafana 会提示修改密码，建议生产环境通过 Docker secret 或外部密钥管理
      - GF_SECURITY_ADMIN_PASSWORD=admin

      # 禁止匿名用户自行注册账号
      - GF_USERS_ALLOW_SIGN_UP=false

    # depends_on：声明服务启动顺序依赖
    # grafana 在 prometheus 启动之后才启动
    # 注意：depends_on 只保证"启动顺序"，不保证"prometheus 已就绪可接受请求"
    # 若需严格就绪检查，需配合 healthcheck + condition: service_healthy
    depends_on:
      - prometheus

    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════════
  # Service: textual — 交易监控 TUI Web App（通过 textual-serve 暴露到浏览器）
  # ══════════════════════════════════════════════════════════════════════════════
  textual:

    build:
      context: ./textual
      dockerfile: dockerfile

    ports:
      # 访问 http://localhost:28080 在浏览器中打开 Textual 交易监控 App
      - "28080:8080"

    environment:
      # textual-serve 用此 URL 构造嵌入 HTML 的 WebSocket 地址
      # 必须与宿主机实际可访问的地址完全一致，否则 WS 无法建立
      - PUBLIC_URL=http://localhost:28080

    depends_on:
      - prometheus

    restart: unless-stopped

# ══════════════════════════════════════════════════════════════════════════════
# volumes：声明 named volumes（命名卷）
# ══════════════════════════════════════════════════════════════════════════════
# 必须在顶层 volumes 块中声明，才能在 services 的 volumes 字段中引用
# Named volume 由 Docker 引擎管理，存储在宿主机的 Docker 数据目录下
# （macOS: ~/Library/Containers/com.docker.docker/Data/vms/...）
# 即使容器被删除（docker compose down），volume 依然保留
# 只有执行 docker compose down -v 或 docker volume rm 才会删除
volumes:

  # Prometheus 时序数据库持久化卷
  # 保存 Prometheus 抓取到的所有历史指标数据
  prometheus_data:

  # Grafana 运行时数据持久化卷
  # 保存 Grafana 的 SQLite 数据库、用户配置、已安装插件等
  grafana_data:
